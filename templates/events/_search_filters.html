<div class="toolbar-section">
  <div class="toolbar-section-label">Category</div>
  <select class="form-select" name="category" data-filter-control="category">
    <option value="">All categories</option>
    {% for value, label in category_choices %}
      <option value="{{ value }}" {% if request.GET.category == value %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</div>

<div class="toolbar-section">
  <div class="toolbar-section-label">Mode</div>
  <select class="form-select" name="mode" data-filter-control="mode">
    <option value="">Any mode</option>
    <option value="online" {% if request.GET.mode == 'online' %}selected{% endif %}>Online</option>
    <option value="offline" {% if request.GET.mode == 'offline' %}selected{% endif %}>Offline</option>
  </select>
</div>

<div class="toolbar-section">
  <div class="toolbar-section-label">Sort</div>
  <select class="form-select" name="sort" data-filter-control="sort">
    <option value="">Default</option>
    <option value="latest" {% if request.GET.sort == 'latest' %}selected{% endif %}>Latest</option>
    <option value="popular" {% if request.GET.sort == 'popular' %}selected{% endif %}>Popular</option>
  </select>
</div>

<div class="toolbar-section">
  <label class="form-check">
    <input
      class="form-check-input"
      type="checkbox"
      value="1"
      {% if request.GET.favorite == '1' %}checked{% endif %}
      data-filter-control="favorite"
    >
    <span class="form-check-label">Favorites only</span>
  </label>
</div>
